
version: "3.9"

services:

  db:
    image: postgres:14
    container_name: postgres_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=070520
      - POSTGRES_DB=filedb
    ports:
      - "5433:5432"

  app:
    build: .
    container_name: fastapi_app
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:070520@db:5432/filedb
      - MAIL_PORT=587
      - MAIL_USERNAME=sarjanpratap@gmail.com
      - MAIL_PASSWORD=sarjan@4051
      - MAIL_SERVER=smtp.gmail.com
      - MAIL_FROM=sarjanpratap@gmail.com
